version: "3.9"

services:
  crispr_rl:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crispr_rl_v4
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
      - ./plots:/app/plots
    environment:
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - crispr_net

  # Optional: Redis for session state (future integration)
  # redis:
  #   image: redis:7-alpine
  #   container_name: crispr_redis
  #   ports:
  #     - "6379:6379"
  #   networks:
  #     - crispr_net

networks:
  crispr_net:
    driver: bridge

volumes:
  crispr_logs:
  crispr_plots:
